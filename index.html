<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LED Board - Fixed Animation</title>
<link href="https://fonts.googleapis.com/css2?family=DotGothic16&display=swap" rel="stylesheet">
<style>
  body {
    margin: 0;
    overflow: hidden;
    background-color: #000;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    font-family: 'DotGothic16', sans-serif;
  }

  /* Layer 0: The Rain Animation */
  canvas { 
    position: absolute; 
    top: 0; 
    left: 0; 
    z-index: 0; 
  }

  /* Scanline Overlay (Makes it look like a screen) */
  body::after {
    content: "";
    position: absolute;
    top: 0; left: 0; width: 100%; height: 100%;
    background: linear-gradient(0deg, transparent 50%, rgba(0, 0, 0, 0.4) 50%);
    background-size: 100% 4px;
    z-index: 1; /* Above rain, below text */
    pointer-events: none;
  }

  /* Layer 2: The Text and Button */
  .overlay {
    position: relative;
    z-index: 10;
    text-align: center;
    pointer-events: none;
  }

  .center-text {
    font-size: 22vw; 
    font-weight: 900;
    text-transform: uppercase;
    line-height: 1;
    letter-spacing: 2px;
    display: block;
    background: radial-gradient(circle, #fff 10%, #00d4ff 40%, transparent 70%);
    background-size: 11px 11px;
    -webkit-background-clip: text;
    background-clip: text;
    -webkit-text-fill-color: transparent;
    filter: drop-shadow(0 0 12px rgba(0, 212, 255, 0.8));
    image-rendering: pixelated;
  }

  .name {
    font-size: 3vw;
    color: #ffffff;
    text-shadow: 0 0 15px #00d4ff;
    margin-top: 40px;
    cursor: pointer;
    pointer-events: auto;
    background: rgba(0, 40, 60, 0.7);
    border: 2px solid #00d4ff;
    padding: 15px 45px;
    display: inline-block;
    border-radius: 4px;
    transition: 0.3s;
    letter-spacing: 5px;
  }

  .hint {
    display: block;
    font-size: 1.2vw;
    color: #00d4ff;
    margin-top: 12px;
    animation: breathe 2s infinite;
  }
  @keyframes breathe { 0%, 100% { opacity: 0.3; } 50% { opacity: 1; } }
  .name:hover { background: #00d4ff; color: #000; box-shadow: 0 0 40px #00d4ff; }

  /* Layer 3: Custom Pop-up (Front) */
  #overlay-blur {
    display: none;
    position: fixed;
    top: 0; left: 0; width: 100%; height: 100%;
    background: rgba(0, 0, 0, 0.85);
    z-index: 99;
    backdrop-filter: blur(5px);
  }

  #custom-alert {
    display: none;
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    background: #051a24;
    border: 3px solid #00d4ff;
    padding: 40px;
    z-index: 100;
    color: #fff;
    text-align: center;
    box-shadow: 0 0 50px rgba(0, 212, 255, 0.5);
    border-radius: 15px;
    min-width: 320px;
  }

  #alert-text { font-size: 24px; margin-bottom: 25px; }
  #close-btn {
    background: #00d4ff;
    border: none;
    padding: 12px 30px;
    color: #000;
    font-weight: bold;
    font-family: 'DotGothic16', sans-serif;
    cursor: pointer;
    border-radius: 5px;
  }
</style>
</head>
<body>

<canvas id="matrix"></canvas>

<div class="overlay">
  <div class="center-text">HELLO</div>
  <div class="name" onclick="showMessage()">
    CLICK ME
    <span class="hint">( A little secret... )</span>
  </div>
</div>

<div id="overlay-blur" onclick="closeAlert()"></div>
<div id="custom-alert">
  <div id="alert-text"></div>
  <button id="close-btn" onclick="closeAlert()">GOT IT!</button>
</div>

<script>
const canvas = document.getElementById("matrix");
const ctx = canvas.getContext("2d");

function resize() {
  canvas.height = window.innerHeight;
  canvas.width = window.innerWidth;
}
window.addEventListener('resize', resize);
resize();

const message = "BE HAPPY "; 
const fontSize = 16; 
const columns = Math.floor(canvas.width / fontSize);
const drops = [];
for (let x = 0; x < columns; x++) { drops[x] = 1; }

function draw() {
  // Clearing with low alpha to create the "trail" effect
  ctx.fillStyle = "rgba(0, 0, 0, 0.1)";
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  ctx.font = fontSize + "px 'DotGothic16'";

  for (let i = 0; i < drops.length; i++) {
    const charIndex = drops[i] % message.length;
    const text = message.charAt(charIndex);
    
    // Faded text
    ctx.fillStyle = "#002233"; 
    ctx.fillText(text, i * fontSize, drops[i] * fontSize);

    // Glowing head
    ctx.fillStyle = "#00d4ff";
    ctx.fillText(text, i * fontSize, (drops[i]) * fontSize);

    if (drops[i] * fontSize > canvas.height && Math.random() > 0.975) {
      drops[i] = 0;
    }
    drops[i]++;
  }
}

function showMessage() {
    const quotes = [
        "If you were a vegetable, you'd be a cutecumber! 🥒",
        "I'm soy into you! 🥟",
        "You're a-maize-ing! 🌽",
        "Don't go bacon my heart! 🥓",
        "You're the berry best! 🍓",
        "Words cannot espresso how much you mean to me! ☕",
        "You're one in a melon! 🍉",
        "We make a great pear! 🍐",
        "You're all I avo wanted! 🥑",
        "I love you s'more every day! 🍫",
        "You're flipping fantastic! 🥞",
        "You've got a pizza my heart! 🍕",
        "You're sub-lime! 🍋",
        "I donut know what I'd do without you! 🍩"
    ];
    const randomQuote = quotes[Math.floor(Math.random() * quotes.length)];
    document.getElementById('alert-text').innerText = randomQuote;
    document.getElementById('custom-alert').style.display = 'block';
    document.getElementById('overlay-blur').style.display = 'block';
}

function closeAlert() {
    document.getElementById('custom-alert').style.display = 'none';
    document.getElementById('overlay-blur').style.display = 'none';
}

// Start animation
setInterval(draw, 50);
</script>

</body>
</html>
