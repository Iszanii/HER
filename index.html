<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ultra LED - No Limits</title>
<link href="https://fonts.googleapis.com/css2?family=DotGothic16&display=swap" rel="stylesheet">
<style>
  body {
    margin: 0;
    overflow: hidden;
    background-color: #000;
    background-image: linear-gradient(0deg, transparent 50%, rgba(0, 0, 0, 0.4) 50%);
    background-size: 100% 4px;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    font-family: 'DotGothic16', sans-serif;
  }

  canvas { position: absolute; top: 0; left: 0; z-index: 1; }

  .overlay {
    position: relative;
    z-index: 10;
    text-align: center;
    pointer-events: none;
  }

  /* THE LED DOT BOARD EFFECT */
  .center-text {
    font-size: 22vw; 
    font-weight: 900;
    text-transform: uppercase;
    line-height: 1;
    letter-spacing: 2px;
    display: block;
    background: radial-gradient(circle, #fff 10%, #00d4ff 40%, transparent 70%);
    background-size: 11px 11px;
    -webkit-background-clip: text;
    background-clip: text;
    -webkit-text-fill-color: transparent;
    filter: drop-shadow(0 0 12px rgba(0, 212, 255, 0.8));
    image-rendering: pixelated;
  }

  /* CLICK ME BUTTON */
  .name {
    font-size: 3vw;
    color: #ffffff;
    text-shadow: 0 0 15px #00d4ff;
    margin-top: 40px;
    cursor: pointer;
    pointer-events: auto;
    background: rgba(0, 40, 60, 0.7);
    border: 2px solid #00d4ff;
    padding: 15px 45px;
    display: inline-block;
    border-radius: 4px;
    transition: 0.3s;
    letter-spacing: 5px;
  }

  .hint {
    display: block;
    font-size: 1.2vw;
    color: #00d4ff;
    margin-top: 12px;
    animation: breathe 2s infinite;
  }

  @keyframes breathe { 0%, 100% { opacity: 0.3; } 50% { opacity: 1; } }
  .name:hover { background: #00d4ff; color: #000; box-shadow: 0 0 40px #00d4ff; }

  /* CUSTOM POP-UP STYLES (Fixes the browser prompt issue) */
  #overlay-blur {
    display: none;
    position: fixed;
    top: 0; left: 0; width: 100%; height: 100%;
    background: rgba(0, 0, 0, 0.85);
    z-index: 99;
    backdrop-filter: blur(5px);
  }

  #custom-alert {
    display: none;
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    background: #051a24;
    border: 3px solid #00d4ff;
    padding: 40px;
    z-index: 100;
    color: #fff;
    text-align: center;
    box-shadow: 0 0 50px rgba(0, 212, 255, 0.5);
    border-radius: 15px;
    min-width: 320px;
    max-width: 80%;
  }

  #alert-text {
    font-size: 24px;
    margin-bottom: 25px;
    line-height: 1.4;
    letter-spacing: 1px;
  }

  #close-btn {
    background: #00d4ff;
    border: none;
    padding: 12px 30px;
    color: #000;
    font-weight: bold;
    font-family: 'DotGothic16', sans-serif;
    cursor: pointer;
    border-radius: 5px;
    transition: 0.2s;
  }

  #close-btn:hover { background: #fff; box-shadow: 0 0 15px #fff; }
</style>
</head>
<body>

<canvas id="matrix"></canvas>

<div class="overlay">
  <div class="center-text">HELLO</div>
  <div class="name" onclick="showMessage()">
    CLICK ME
    <span class="hint">( A little secret... )</span>
  </div>
</div>

<div id="overlay-blur" onclick="closeAlert()"></div>
<div id="custom-alert">
  <div id="alert-text"></div>
  <button id="close-btn" onclick="closeAlert()">GOT IT!</button>
</div>

<script>
const canvas = document.getElementById("matrix");
const ctx = canvas.getContext("2d");

function resize() {
  canvas.height = window.innerHeight;
  canvas.width = window.innerWidth;
}
window.addEventListener('resize', resize);
resize();

// Background Rain
const message = "BE HAPPY "; 
const fontSize = 16; 
const columns = Math.floor(canvas.width / fontSize);
const drops = [];
for (let x = 0; x < columns; x++) { drops[x] = 1; }

function draw() {
  ctx.fillStyle = "rgba(0, 0, 0, 0.15)";
  ctx.fillRect(0, 0, canvas.width, canvas.height);
  ctx.font = fontSize + "px 'DotGothic16'";
  for (let i = 0; i < drops.length; i++) {
    const charIndex = drops[i] % message.length;
    const text = message.charAt(charIndex);
    ctx.fillStyle = "#002233"; 
    ctx.fillText(text, i * fontSize, drops[i] * fontSize);
    ctx.fillStyle = "#00d4ff";
    ctx.fillText(text, i * fontSize, (drops[i]) * fontSize);
    if (drops[i] * fontSize > canvas.height && Math.random() > 0.975) { drops[i] = 0; }
    drops[i]++;
  }
}

// SHOW MESSAGE LOGIC
function showMessage() {
    const quotes = [
        "I hope this smile stays on your face forever. Nobody can make you happy with yourself. Be happy with what you are and be generous with it. and you won't have to hunt for happiness. ✨",
        "You are the best thing that happened today! 💙",
        "You will never find the right things, if you never let go of the wrong one",
        "There may be a million things to smile about, but you're definitely my favorite one ",
        "Remember: You are loved, valued, and enough. I hope you know how brave, important and wonderful you aways are even when you don't feel like it ✨",
        "Get comfortable with being uncomfortable because that is how you grow",
        "Your skin isn't a paper, don't cut it. Yur heart isn't a door, don't lock it. Your neck isn't a rope, don't hang it. Your life is too precious, don't end it.",
        "If you were a vegetable, you'd be a cutecumber",
        "Words cannot espresso how much you mean to me",
        "Hidup bukan tentang dipukul lalu kamu membalas, tapi tentang bagaimana kamu mampu berdiri tegak walau banyak pukulan yang kamu terima"
    ];

    const randomQuote = quotes[Math.floor(Math.random() * quotes.length)];
    
    // Display custom alert
    document.getElementById('alert-text').innerText = randomQuote;
    document.getElementById('custom-alert').style.display = 'block';
    document.getElementById('overlay-blur').style.display = 'block';
}

function closeAlert() {
    document.getElementById('custom-alert').style.display = 'none';
    document.getElementById('overlay-blur').style.display = 'none';
}

setInterval(draw, 50);
</script>

</body>
</html>
